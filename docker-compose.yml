services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    command: sh -c "npm install --no-audit --no-fund && npm run dev -- --hostname 0.0.0.0"
    environment:
      MONGODB_URI: ${DOCKER_MONGODB_URI:-mongodb://mongo:27017/nodeworks}
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-long-random-secret}
      AI_API_BASE_URL: http://backend:8010
      CV_ANALYSIS_API_URL: http://backend:8010/api/analyze-cv
      AI_INTERVIEW_API_URL: http://interview:8001
      NEXT_PUBLIC_CV_ANALYSIS_API_URL: ${NEXT_PUBLIC_CV_ANALYSIS_API_URL:-http://localhost:8010/api/analyze-cv}
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      backend:
        condition: service_healthy
      interview:
        condition: service_started
      mongo:
        condition: service_started

  backend:
    build:
      context: .
      dockerfile: backend/ai_api/Dockerfile
    ports:
      - "8010:8010"
    environment:
      NEO4J_URI: ${DOCKER_NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      CV_ANALYSIS_PROVIDER: ${CV_ANALYSIS_PROVIDER:-glm}
      CV_ANALYSIS_MODEL: ${CV_ANALYSIS_MODEL:-glm-5.2}
      PROJECT_SKILL_SUGGESTION_MODEL: ${PROJECT_SKILL_SUGGESTION_MODEL:-}
      OPENCODE_GO_API_KEY: ${OPENCODE_GO_API_KEY:-}
      OPENCODE_GO_BASE_URL: ${OPENCODE_GO_BASE_URL:-https://opencode.ai/zen/go/v1}
      GLM_API_KEY: ${GLM_API_KEY:-}
      ZHIPUAI_API_KEY: ${ZHIPUAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8010/health'', timeout=5)"',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${DOCKER_NEO4J_USER:-neo4j}/${DOCKER_NEO4J_PASSWORD:-password}
      HEALTHCHECK_NEO4J_PASSWORD: ${DOCKER_NEO4J_PASSWORD:-password}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'cypher-shell -a bolt://localhost:7687 -u neo4j -p "$$HEALTHCHECK_NEO4J_PASSWORD" ''RETURN 1''',
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  interview:
    build:
      context: .
      dockerfile: backend/interview_api/Dockerfile
    ports:
      - "8001:8001"
    environment:
      MONGODB_URI: ${DOCKER_MONGODB_URI:-mongodb://mongo:27017/nodeworks}
      CV_ANALYSIS_PROVIDER: ${CV_ANALYSIS_PROVIDER:-opencode_go}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENCODE_GO_API_KEY: ${OPENCODE_GO_API_KEY:-}
      OPENCODE_GO_BASE_URL: ${OPENCODE_GO_BASE_URL:-https://opencode.ai/zen/go/v1}
      INTERVIEW_MODEL: ${INTERVIEW_MODEL:-deepseek-v4-pro}
    depends_on:
      mongo:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8001/health'', timeout=5)"',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  frontend_node_modules:
  frontend_next:
  neo4j_data:
  neo4j_logs:
  mongo_data:
